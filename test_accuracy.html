<!DOCTYPE html>
<html>
<head>
  <title>PreventX Accuracy Test</title>
  <style>
    body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 20px; }
    #output { white-space: pre-wrap; line-height: 1.6; font-size: 13px; }
    h1 { color: #14b8a6; }
  </style>
</head>
<body>
  <h1>PreventX ML Model Accuracy Test</h1>
  <div id="output">Running tests...</div>
  <script type="module">
    import { runPrediction } from './src/lib/mlEngine.ts';

    function makeInput(overrides) {
      return {
        age: '35', gender: 'Male', height: '170', weight: '70',
        familyDiabetes: 'No', familyHypertension: 'No', familyAnemia: 'No',
        exerciseFrequency: '2-3 times a week', diet: 'Mixed',
        sleep: '7–8 hours (recommended)', alcohol: 'Never', smoking: 'Never',
        stressLevel: 'Low', saltIntake: 'Moderate', sugarIntake: 'Weekly',
        waterIntake: 'Moderate', fattyFood: 'Moderate', junkFood: 'Moderate',
        existingConditions: ['None'], symptoms: [],
        diagSugar: 'No', gestationalDiabetes: 'No',
        heavyBleeding: '', periodDuration: '', homeBP: '',
        fingernailPhoto: null, eyelidPhoto: null, otherCondition: '',
        ...overrides,
      };
    }

    const testCases = [
      { id:1, label:'Healthy young male, active', input: makeInput({ age:'25', weight:'68', height:'175', exerciseFrequency:'Daily', stressLevel:'Low', sugarIntake:'Rarely (natural only)', saltIntake:'Low (minimal added salt)' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:2, label:'Healthy young female', input: makeInput({ age:'28', gender:'Female', weight:'58', height:'162', exerciseFrequency:'2-3 times a week', diet:'Vegetarian', sugarIntake:'Rarely (natural only)', saltIntake:'Low (minimal added salt)' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:3, label:'Middle-aged fit male', input: makeInput({ age:'42', weight:'72', height:'178', exerciseFrequency:'Daily', stressLevel:'Low' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:4, label:'Healthy teen', input: makeInput({ age:'18', weight:'62', height:'172', exerciseFrequency:'Daily', stressLevel:'Low', sugarIntake:'Rarely (natural only)' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:5, label:'Healthy active senior', input: makeInput({ age:'60', weight:'74', height:'170', exerciseFrequency:'Daily', stressLevel:'Low', sugarIntake:'Rarely (natural only)' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:6, label:'Classic T2DM: obese, sedentary, family, high sugar', input: makeInput({ age:'52', weight:'105', height:'170', familyDiabetes:'Yes', exerciseFrequency:'Never', stressLevel:'High', sugarIntake:'Daily', symptoms:['Frequent urination','Excessive thirst','Unexplained weight loss','Blurred vision'], diagSugar:'Yes' }), expected: { diabetes:'positive', hypertension:'negative', anemia:'negative' } },
      { id:7, label:'Pre-diabetic overweight female', input: makeInput({ age:'45', gender:'Female', weight:'85', height:'160', familyDiabetes:'Yes', exerciseFrequency:'Rarely', sugarIntake:'Daily', symptoms:['Fatigue','Frequent urination'] }), expected: { diabetes:'positive', hypertension:'negative', anemia:'negative' } },
      { id:8, label:'Gestational DM + obese female', input: makeInput({ age:'38', gender:'Female', weight:'92', height:'158', familyDiabetes:'Yes', gestationalDiabetes:'Yes', sugarIntake:'Daily', exerciseFrequency:'Never', symptoms:['Excessive thirst','Frequent urination','Fatigue'] }), expected: { diabetes:'positive', hypertension:'negative', anemia:'negative' } },
      { id:9, label:'Young obese male polyphagia', input: makeInput({ age:'30', weight:'110', height:'175', familyDiabetes:'Yes', sugarIntake:'Daily', exerciseFrequency:'Never', symptoms:['Frequent urination','Excessive thirst','Increased appetite','Fatigue'] }), expected: { diabetes:'positive', hypertension:'negative', anemia:'negative' } },
      { id:10, label:'Diabetic senior neuropathy', input: makeInput({ age:'65', weight:'95', height:'168', familyDiabetes:'Yes', diagSugar:'Yes', exerciseFrequency:'Never', sugarIntake:'Daily', stressLevel:'High', symptoms:['Numbness/tingling','Blurred vision','Frequent urination','Slow wound healing','Fatigue'] }), expected: { diabetes:'positive', hypertension:'negative', anemia:'negative' } },
      { id:11, label:'Classic HTN: salt, smoker, family, stressed', input: makeInput({ age:'55', weight:'88', height:'172', familyHypertension:'Yes', smoking:'Yes, regularly', stressLevel:'High', saltIntake:'High', sleep:'Less than 5 hours', exerciseFrequency:'Never', symptoms:['Headaches','Dizziness'], homeBP:'150/95' }), expected: { diabetes:'negative', hypertension:'positive', anemia:'negative' } },
      { id:12, label:'HTN obese female', input: makeInput({ age:'50', gender:'Female', weight:'95', height:'160', familyHypertension:'Yes', stressLevel:'High', saltIntake:'High', exerciseFrequency:'Never', sleep:'5–6 hours', symptoms:['Headaches','Shortness of breath'], homeBP:'145/90' }), expected: { diabetes:'negative', hypertension:'positive', anemia:'negative' } },
      { id:13, label:'Smoker high salt no exercise', input: makeInput({ age:'48', weight:'82', height:'170', smoking:'Yes, regularly', alcohol:'Frequently', saltIntake:'High', stressLevel:'High', exerciseFrequency:'Never', sleep:'Less than 5 hours', familyHypertension:'Yes', homeBP:'155/100' }), expected: { diabetes:'negative', hypertension:'positive', anemia:'negative' } },
      { id:14, label:'Elderly with kidney + BP', input: makeInput({ age:'70', weight:'80', height:'168', familyHypertension:'Yes', stressLevel:'High', saltIntake:'High', existingConditions:['Kidney disease'], smoking:'Yes, regularly', symptoms:['Headaches','Chest pain'], homeBP:'160/100' }), expected: { diabetes:'negative', hypertension:'positive', anemia:'negative' } },
      { id:15, label:'Stressed worker poor sleep', input: makeInput({ age:'40', weight:'85', height:'175', stressLevel:'High', sleep:'Less than 5 hours', saltIntake:'High', exerciseFrequency:'Never', familyHypertension:'Yes', smoking:'Occasionally', homeBP:'140/92' }), expected: { diabetes:'negative', hypertension:'positive', anemia:'negative' } },
      { id:16, label:'Iron-deficient female heavy periods', input: makeInput({ age:'28', gender:'Female', weight:'48', height:'158', diet:'Vegetarian', familyAnemia:'Yes', heavyBleeding:'Yes, regularly', periodDuration:'7+ days', symptoms:['Fatigue','Pale skin','Shortness of breath','Dizziness','Cold hands/feet'] }), expected: { diabetes:'negative', hypertension:'negative', anemia:'positive' } },
      { id:17, label:'Anemic teen female', input: makeInput({ age:'16', gender:'Female', weight:'42', height:'155', diet:'Vegetarian', familyAnemia:'Yes', heavyBleeding:'Yes, regularly', periodDuration:'7+ days', symptoms:['Fatigue','Pale skin','Hair loss','Brittle nails','Dizziness'] }), expected: { diabetes:'negative', hypertension:'negative', anemia:'positive' } },
      { id:18, label:'Pregnant with anemia symptoms', input: makeInput({ age:'30', gender:'Female', weight:'55', height:'160', familyAnemia:'Yes', diet:'Vegetarian', symptoms:['Fatigue','Pale skin','Shortness of breath','Dizziness','Pica (craving non-food items)'] }), expected: { diabetes:'negative', hypertension:'negative', anemia:'positive' } },
      { id:19, label:'Elderly male chronic fatigue pallor', input: makeInput({ age:'72', weight:'60', height:'165', familyAnemia:'Yes', symptoms:['Fatigue','Pale skin','Shortness of breath','Cold hands/feet','Chest pain'] }), expected: { diabetes:'negative', hypertension:'negative', anemia:'positive' } },
      { id:20, label:'Young female pica hair loss', input: makeInput({ age:'22', gender:'Female', weight:'45', height:'157', diet:'Vegetarian', familyAnemia:'Yes', heavyBleeding:'Yes, occasionally', periodDuration:'5-7 days', symptoms:['Fatigue','Pale skin','Hair loss','Pica (craving non-food items)','Brittle nails'] }), expected: { diabetes:'negative', hypertension:'negative', anemia:'positive' } },
      { id:21, label:'Metabolic syndrome: DM+HTN', input: makeInput({ age:'58', weight:'100', height:'172', familyDiabetes:'Yes', familyHypertension:'Yes', exerciseFrequency:'Never', stressLevel:'High', sugarIntake:'Daily', saltIntake:'High', smoking:'Yes, regularly', sleep:'Less than 5 hours', diagSugar:'Yes', homeBP:'150/95', symptoms:['Frequent urination','Excessive thirst','Headaches','Fatigue'] }), expected: { diabetes:'positive', hypertension:'positive', anemia:'negative' } },
      { id:22, label:'Anemic+diabetic female', input: makeInput({ age:'45', gender:'Female', weight:'88', height:'158', familyDiabetes:'Yes', familyAnemia:'Yes', diet:'Vegetarian', sugarIntake:'Daily', exerciseFrequency:'Never', heavyBleeding:'Yes, regularly', periodDuration:'7+ days', symptoms:['Fatigue','Pale skin','Frequent urination','Excessive thirst','Dizziness'] }), expected: { diabetes:'positive', hypertension:'negative', anemia:'positive' } },
      { id:23, label:'Triple comorbid elderly', input: makeInput({ age:'65', weight:'105', height:'170', familyDiabetes:'Yes', familyHypertension:'Yes', familyAnemia:'Yes', exerciseFrequency:'Never', stressLevel:'High', smoking:'Yes, regularly', alcohol:'Frequently', sugarIntake:'Daily', saltIntake:'High', sleep:'Less than 5 hours', diagSugar:'Yes', homeBP:'160/100', symptoms:['Fatigue','Pale skin','Frequent urination','Headaches','Shortness of breath','Chest pain'] }), expected: { diabetes:'positive', hypertension:'positive', anemia:'positive' } },
      { id:24, label:'Slightly overweight moderate risk', input: makeInput({ age:'40', weight:'82', height:'172', exerciseFrequency:'Rarely', stressLevel:'Moderate' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:25, label:'Thin female mild fatigue', input: makeInput({ age:'30', gender:'Female', weight:'50', height:'160', symptoms:['Fatigue'] }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:26, label:'Obese but young no other risk', input: makeInput({ age:'22', weight:'100', height:'178', exerciseFrequency:'2-3 times a week', stressLevel:'Low' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:27, label:'Elderly female minimal symptoms', input: makeInput({ age:'68', gender:'Female', weight:'65', height:'155', exerciseFrequency:'2-3 times a week', stressLevel:'Low', sugarIntake:'Rarely (natural only)', saltIntake:'Low (minimal added salt)' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:28, label:'DM polyuria polydipsia weight loss', input: makeInput({ age:'50', weight:'78', height:'170', familyDiabetes:'Yes', sugarIntake:'Daily', exerciseFrequency:'Never', symptoms:['Frequent urination','Excessive thirst','Unexplained weight loss','Increased appetite','Fatigue'] }), expected: { diabetes:'positive', hypertension:'negative', anemia:'negative' } },
      { id:29, label:'HTN chest pain breathless', input: makeInput({ age:'55', weight:'90', height:'175', familyHypertension:'Yes', smoking:'Yes, regularly', saltIntake:'High', stressLevel:'High', sleep:'Less than 5 hours', exerciseFrequency:'Never', symptoms:['Chest pain','Shortness of breath','Headaches'], homeBP:'165/105' }), expected: { diabetes:'negative', hypertension:'positive', anemia:'negative' } },
      { id:30, label:'Severe anemia post-partum', input: makeInput({ age:'26', gender:'Female', weight:'46', height:'155', familyAnemia:'Yes', diet:'Vegetarian', heavyBleeding:'Yes, regularly', periodDuration:'7+ days', symptoms:['Fatigue','Pale skin','Shortness of breath','Dizziness','Cold hands/feet','Hair loss'] }), expected: { diabetes:'negative', hypertension:'negative', anemia:'positive' } },
      { id:31, label:'Healthy male athlete', input: makeInput({ age:'24', weight:'75', height:'182', exerciseFrequency:'Daily', stressLevel:'Low', sugarIntake:'Rarely (natural only)', saltIntake:'Low (minimal added salt)', sleep:'7–8 hours (recommended)' }), expected: { diabetes:'negative', hypertension:'negative', anemia:'negative' } },
      { id:32, label:'Morbidly obese all DM symptoms', input: makeInput({ age:'48', gender:'Female', weight:'120', height:'162', familyDiabetes:'Yes', diagSugar:'Yes', gestationalDiabetes:'Yes', sugarIntake:'Daily', exerciseFrequency:'Never', stressLevel:'High', symptoms:['Frequent urination','Excessive thirst','Blurred vision','Slow wound healing','Numbness/tingling','Fatigue'] }), expected: { diabetes:'positive', hypertension:'negative', anemia:'negative' } },
      { id:33, label:'HTN heavy drinker smoker', input: makeInput({ age:'52', weight:'85', height:'170', familyHypertension:'Yes', smoking:'Yes, regularly', alcohol:'Frequently', saltIntake:'High', stressLevel:'High', exerciseFrequency:'Never', sleep:'Less than 5 hours', homeBP:'155/98', existingConditions:['High blood pressure'], symptoms:['Headaches','Dizziness'] }), expected: { diabetes:'negative', hypertension:'positive', anemia:'negative' } },
    ];

    const out = document.getElementById('output');
    let text = '';
    const log = (s) => { text += s + '\n'; out.textContent = text; };

    log('╔══════════════════════════════════════════════════════════════════╗');
    log('║         PreventX ML Model Accuracy Test Suite                   ║');
    log('║         Testing 33 clinical cases across 3 models               ║');
    log('╚══════════════════════════════════════════════════════════════════╝\n');

    let dOk=0, hOk=0, aOk=0;
    const total = testCases.length;
    const failures = [];

    for (const tc of testCases) {
      const pred = await runPrediction(tc.input);
      const dR=pred.diabetes.risk, hR=pred.hypertension.risk, aR=pred.anemia.risk;
      const dP=(tc.expected.diabetes==='positive'&&dR>50)||(tc.expected.diabetes==='negative'&&dR<=50);
      const hP=(tc.expected.hypertension==='positive'&&hR>50)||(tc.expected.hypertension==='negative'&&hR<=50);
      const aP=(tc.expected.anemia==='positive'&&aR>50)||(tc.expected.anemia==='negative'&&aR<=50);
      if(dP) dOk++; if(hP) hOk++; if(aP) aOk++;
      const d=dP?'✅':'❌', h=hP?'✅':'❌', a=aP?'✅':'❌';
      log(`#${String(tc.id).padStart(2,'0')} ${tc.label}`);
      log(`    ${d} DM:${dR}% (${tc.expected.diabetes})  ${h} HTN:${hR}% (${tc.expected.hypertension})  ${a} AN:${aR}% (${tc.expected.anemia})`);
      if(!dP||!hP||!aP) failures.push({...tc, dR, hR, aR, dP, hP, aP});
    }

    log('\n═══════════════════════════════════════════════════════════════════');
    log('                     ACCURACY REPORT');
    log('═══════════════════════════════════════════════════════════════════');
    log(`  Diabetes:      ${dOk}/${total} = ${((dOk/total)*100).toFixed(1)}%`);
    log(`  Hypertension:  ${hOk}/${total} = ${((hOk/total)*100).toFixed(1)}%`);
    log(`  Anemia:        ${aOk}/${total} = ${((aOk/total)*100).toFixed(1)}%`);
    const overall = ((dOk+hOk+aOk)/(total*3)*100).toFixed(1);
    log(`  ─────────────────────────────────────`);
    log(`  Overall:       ${overall}% (${dOk+hOk+aOk}/${total*3})`);
    log('═══════════════════════════════════════════════════════════════════');

    if(failures.length>0) {
      log(`\n⚠️  ${failures.length} case(s) with failures:`);
      failures.forEach(f => {
        const issues=[];
        if(!f.dP) issues.push(`DM:${f.dR}% exp:${f.expected.diabetes}`);
        if(!f.hP) issues.push(`HTN:${f.hR}% exp:${f.expected.hypertension}`);
        if(!f.aP) issues.push(`AN:${f.aR}% exp:${f.expected.anemia}`);
        log(`  #${f.id} ${f.label}: ${issues.join(', ')}`);
      });
    }
  </script>
</body>
</html>
